# SkySpy reverse proxy — HTTP only. TLS is terminated at the Cloudflare edge;
# cloudflared forwards to this container as http://skyspy:80. Django's
# SECURE_PROXY_SSL_HEADER trusts X-Forwarded-Proto, which we pass through from
# cloudflared (falling back to $scheme for direct LAN hits), so DEBUG=False HSTS/
# SSL-redirect works without a redirect loop.

# Honor the edge-provided proto; default to the connection scheme for LAN access.
map $http_x_forwarded_proto $fwd_proto {
    default $scheme;
    https   https;
    http    http;
}

server {
    listen 80;
    server_name radar.chaos.navy _;

    client_max_body_size 100M;

    # Resolve the `api` upstream via Docker's embedded DNS at request time. With
    # a static `upstream {}` block nginx resolves once at startup and caches the
    # IP forever, so recreating the api container (redeploy / auto-update) gives
    # it a new IP and nginx serves 502 until reloaded. A variable proxy_pass +
    # resolver re-resolves per request, so recreates are transparent.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $skyspy_api api:8000;

    # Django (DEBUG=False) sends Cross-Origin-Opener-Policy: same-origin, which
    # severs window.opener when the OIDC login popup navigates to Azure and back
    # — the callback then can't postMessage the token back or self-close ("OIDC
    # login cancelled", popup stuck on the app). same-origin-allow-popups keeps
    # COOP isolation from other cross-origin docs while letting popups this page
    # opens retain their opener, so the OAuth popup posts its token and closes.
    proxy_hide_header Cross-Origin-Opener-Policy;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Real-time: Socket.IO + raw WebSocket need the upgrade dance + long timeouts.
    location /socket.io/ {
        proxy_pass http://$skyspy_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /ws/ {
        proxy_pass http://$skyspy_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check — no access logging.
    location = /health/ {
        proxy_pass http://$skyspy_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # Everything else (REST API + baked-in frontend).
    location / {
        proxy_pass http://$skyspy_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
