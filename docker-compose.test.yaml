services:
  # Django API Test runner service
  api-test:
    container_name: skyspy_api_test
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["test"]
    environment:
      # Django Settings
      - DJANGO_SETTINGS_MODULE=skyspy.tests.test_settings
      - DJANGO_SECRET_KEY=test-secret-key-for-testing-only
      - DEBUG=False

      # Database: direct to postgres with a dedicated test DB. Routing through
      # pgbouncer pointed tests at the dev "adsb" database (test_settings sets
      # TEST.NAME to the URL's own db name), so live dev-stack data polluted
      # test runs whenever the dev profile was up.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adsb}:${POSTGRES_PASSWORD:-adsb}@postgres:5432/${POSTGRES_TEST_DB:-adsb_test}

      # Redis
      - REDIS_URL=redis://redis:6379/0

      # ADS-B Sources
      - ULTRAFEEDER_HOST=${ULTRAFEEDER_HOST:-ultrafeeder}
      - ULTRAFEEDER_PORT=${ULTRAFEEDER_PORT:-80}
      - DUMP978_HOST=${DUMP978_HOST:-dump978}
      - DUMP978_PORT=${DUMP978_PORT:-80}

      # Feeder Location
      - FEEDER_LAT=${FEEDER_LAT:-47.9377}
      - FEEDER_LON=${FEEDER_LON:--121.9687}

      # Notifications
      - APPRISE_URLS=${APPRISE_URLS:-}
      - NOTIFICATION_COOLDOWN=${NOTIFICATION_COOLDOWN:-300}

      # Safety Monitoring
      - SAFETY_MONITORING_ENABLED=true

      # Disable external services for tests
      - PHOTO_CACHE_ENABLED=false
      - S3_ENABLED=false
      - WHISPER_ENABLED=false
      - TRANSCRIPTION_ENABLED=false
      - OPENSKY_DB_ENABLED=false
      - LLM_ENABLED=false
      - SENTRY_DSN=
      - PROMETHEUS_ENABLED=false

      # Aircraft streaming - disabled for tests to ensure polling tests still work
      - AIRCRAFT_STREAM_ENABLED=false

      # Python
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./test-results:/app/test-results
      - ./skyspy_django/skyspy:/app/skyspy:ro  # Hot reload Python code
      - ./skyspy_common/skyspy_common:/opt/venv/lib/python3.14/site-packages/skyspy_common:ro  # Hot reload shared pkg (subprocess_decode etc.)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ultrafeeder:
        condition: service_healthy
      dump978:
        condition: service_healthy
    networks:
      - test-network
    working_dir: /app
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        python manage.py migrate --noinput &&
        echo 'Running tests...' &&
        COVERAGE_FILE=/app/test-results/.coverage pytest -v --tb=short --junitxml=/app/test-results/results.xml --cov=skyspy --cov-report=xml:/app/test-results/coverage.xml --cov-report=html:/app/test-results/coverage --cov-report=term-missing --cov-fail-under=40
      "

  # Django API Development server
  api:
    container_name: skyspy_api_dev
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["dev"]
    env_file:
      - .env.test
    environment:
      # Django Settings
      - DJANGO_SETTINGS_MODULE=skyspy.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # Authentication (default to public for dev)
      - AUTH_MODE=${AUTH_MODE:-public}

      # Database: Point to pgbouncer instead of postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adsb}:${POSTGRES_PASSWORD:-adsb}@pgbouncer:5432/${POSTGRES_DB:-adsb}

      # Redis
      - REDIS_URL=redis://redis:6379/0

      # ADS-B Sources
      - ULTRAFEEDER_HOST=${ULTRAFEEDER_HOST:-ultrafeeder}
      - ULTRAFEEDER_PORT=${ULTRAFEEDER_PORT:-80}
      - DUMP978_HOST=${DUMP978_HOST:-dump978}
      - DUMP978_PORT=${DUMP978_PORT:-80}

      # Feeder Location
      - FEEDER_LAT=${FEEDER_LAT:-47.9377}
      - FEEDER_LON=${FEEDER_LON:--121.9687}

      # Polling
      - POLLING_INTERVAL=${POLLING_INTERVAL:-2}
      - DB_STORE_INTERVAL=${DB_STORE_INTERVAL:-5}
      - SESSION_TIMEOUT_MINUTES=${SESSION_TIMEOUT_MINUTES:-30}

      # Notifications
      - APPRISE_URLS=${APPRISE_URLS:-}
      - NOTIFICATION_COOLDOWN=${NOTIFICATION_COOLDOWN:-300}

      # Safety Monitoring
      - SAFETY_MONITORING_ENABLED=${SAFETY_MONITORING_ENABLED:-True}

      # ACARS settings
      - ACARS_ENABLED=${ACARS_ENABLED:-True}
      - ACARS_PORT=${ACARS_PORT:-5555}
      - VDLM2_PORT=${VDLM2_PORT:-5556}

      # OpenSky DB
      - OPENSKY_DB_ENABLED=${OPENSKY_DB_ENABLED:-True}
      - OPENSKY_DB_PATH=${OPENSKY_DB_PATH:-/data/opensky/aircraft-database.csv}

      # Photo Cache
      - PHOTO_CACHE_ENABLED=${PHOTO_CACHE_ENABLED:-True}
      - PHOTO_CACHE_DIR=${PHOTO_CACHE_DIR:-/data/photos}
      - PHOTO_AUTO_DOWNLOAD=${PHOTO_AUTO_DOWNLOAD:-True}

      # S3 Storage
      - S3_ENABLED=${S3_ENABLED:-false}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-us-west-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}

      # Radio/Audio
      - RADIO_ENABLED=${RADIO_ENABLED:-True}
      - RADIO_AUDIO_DIR=${RADIO_AUDIO_DIR:-/data/radio}

      # Transcription
      - TRANSCRIPTION_ENABLED=${TRANSCRIPTION_ENABLED:-False}
      - WHISPER_ENABLED=${WHISPER_ENABLED:-False}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000}

      # Aircraft streaming (SSE mode preferred, or 'adsbx' for ADSBexchange API)
      - AIRCRAFT_STREAM_ENABLED=${AIRCRAFT_STREAM_ENABLED:-True}
      - AIRCRAFT_STREAM_HOST=${AIRCRAFT_STREAM_HOST:-ultrafeeder}
      - AIRCRAFT_STREAM_PORT=${AIRCRAFT_STREAM_PORT:-30047}
      - AIRCRAFT_STREAM_BATCH_MS=${AIRCRAFT_STREAM_BATCH_MS:-100}
      - AIRCRAFT_STREAM_MODE=${AIRCRAFT_STREAM_MODE:-sse}
      - AIRCRAFT_STREAM_SSE_PORT=${AIRCRAFT_STREAM_SSE_PORT:-80}
      - AIRCRAFT_STREAM_SSE_PATH=${AIRCRAFT_STREAM_SSE_PATH:-/v2/sse}
      # ADSBexchange API streaming (when AIRCRAFT_STREAM_MODE=adsbx)
      - AIRCRAFT_STREAM_ADSBX_INTERVAL=${AIRCRAFT_STREAM_ADSBX_INTERVAL:-2}
      - AIRCRAFT_STREAM_ADSBX_RADIUS=${AIRCRAFT_STREAM_ADSBX_RADIUS:-250}
      - ADSBX_LIVE_ENABLED=${ADSBX_LIVE_ENABLED:-False}
      - ADSBX_RAPIDAPI_KEY=${ADSBX_RAPIDAPI_KEY:-}

      # Sentry
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-local-dev}

      # Python
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./test/api-cache:/data
      - ./skyspy_django/skyspy:/app/skyspy:ro  # Hot reload Python code
      - ./skyspy_common/skyspy_common:/opt/venv/lib/python3.14/site-packages/skyspy_common:ro  # Hot reload shared pkg (subprocess_decode etc.)
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      ultrafeeder:
        condition: service_healthy
      dump978:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - test-network
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        python manage.py migrate --noinput &&
        echo 'Creating superuser if not exists...' &&
        python manage.py createsuperuser --noinput || true &&
        echo 'Syncing Celery tasks to database...' &&
        python manage.py sync_celery_tasks &&
        echo 'Starting Daphne ASGI server...' &&
        daphne -b 0.0.0.0 -p 8000 --application-close-timeout 30 skyspy.asgi:application
      "

  # Celery Worker for dev profile
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skyspy_celery_worker_dev
    profiles: ["dev"]
    env_file:
      - .env.test
    environment:
      - DJANGO_SETTINGS_MODULE=skyspy.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adsb}:${POSTGRES_PASSWORD:-adsb}@pgbouncer:5432/${POSTGRES_DB:-adsb}
      - REDIS_URL=redis://redis:6379/0
      - ULTRAFEEDER_HOST=${ULTRAFEEDER_HOST:-ultrafeeder}
      - ULTRAFEEDER_PORT=${ULTRAFEEDER_PORT:-80}
      - FEEDER_LAT=${FEEDER_LAT:-47.9377}
      - FEEDER_LON=${FEEDER_LON:--121.9687}
      - POLLING_INTERVAL=${POLLING_INTERVAL:-2}
      - SAFETY_MONITORING_ENABLED=${SAFETY_MONITORING_ENABLED:-True}
      - ACARS_ENABLED=${ACARS_ENABLED:-True}
      - PHOTO_CACHE_ENABLED=${PHOTO_CACHE_ENABLED:-true}
      - PHOTO_CACHE_DIR=/data/photos
      - RADIO_ENABLED=${RADIO_ENABLED:-True}
      - RADIO_AUDIO_DIR=/data/radio
      # Aircraft streaming (SSE mode preferred, or 'adsbx' for ADSBexchange API)
      - AIRCRAFT_STREAM_ENABLED=${AIRCRAFT_STREAM_ENABLED:-True}
      - AIRCRAFT_STREAM_HOST=${AIRCRAFT_STREAM_HOST:-ultrafeeder}
      - AIRCRAFT_STREAM_PORT=${AIRCRAFT_STREAM_PORT:-30047}
      - AIRCRAFT_STREAM_BATCH_MS=${AIRCRAFT_STREAM_BATCH_MS:-100}
      - AIRCRAFT_STREAM_MODE=${AIRCRAFT_STREAM_MODE:-sse}
      - AIRCRAFT_STREAM_SSE_PORT=${AIRCRAFT_STREAM_SSE_PORT:-80}
      - AIRCRAFT_STREAM_SSE_PATH=${AIRCRAFT_STREAM_SSE_PATH:-/v2/sse}
      # ADSBexchange API streaming (when AIRCRAFT_STREAM_MODE=adsbx)
      - AIRCRAFT_STREAM_ADSBX_INTERVAL=${AIRCRAFT_STREAM_ADSBX_INTERVAL:-2}
      - AIRCRAFT_STREAM_ADSBX_RADIUS=${AIRCRAFT_STREAM_ADSBX_RADIUS:-250}
      - ADSBX_LIVE_ENABLED=${ADSBX_LIVE_ENABLED:-False}
      - ADSBX_RAPIDAPI_KEY=${ADSBX_RAPIDAPI_KEY:-}
      - CELERY_POOL=gevent
    volumes:
      - ./test/api-cache:/data
      - ./skyspy_django/skyspy:/app/skyspy:ro  # Hot reload Python code
      - ./skyspy_common/skyspy_common:/opt/venv/lib/python3.14/site-packages/skyspy_common:ro  # Hot reload shared pkg (subprocess_decode etc.)
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      ultrafeeder:
        condition: service_healthy
    networks:
      - test-network
    command: >
      celery -A skyspy worker
      --loglevel=info
      --concurrency=50
      --queues=polling,default,database,transcription,notifications,low_priority
      --pool=gevent
    healthcheck:
      # Base image HEALTHCHECK curls :8000 (the web server) which this worker
      # container does not run -> always "unhealthy". Ping the worker via the
      # broker instead.
      test: ["CMD-SHELL", "celery -A skyspy inspect ping -t 8 | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s

  # ACARS UDP Listener for dev profile
  acars-listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skyspy_acars_listener_dev
    profiles: ["dev"]
    env_file:
      - .env.test
    environment:
      - DJANGO_SETTINGS_MODULE=skyspy.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adsb}:${POSTGRES_PASSWORD:-adsb}@pgbouncer:5432/${POSTGRES_DB:-adsb}
      - REDIS_URL=redis://redis:6379/0
      - ACARS_ENABLED=${ACARS_ENABLED:-True}
      - ACARS_PORT=${ACARS_PORT:-5550}
      - VDLM2_PORT=${VDLM2_PORT:-5555}
    volumes:
      - ./skyspy_django/skyspy:/app/skyspy:ro
      - ./skyspy_common/skyspy_common:/opt/venv/lib/python3.14/site-packages/skyspy_common:ro  # Hot reload shared pkg (subprocess_decode etc.)
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - test-network
    command: python manage.py run_acars --acars-port 5550 --vdlm2-port 5555 -v 2
    healthcheck:
      # Base image HEALTHCHECK curls :8000 (the web server) which this listener
      # does not run -> always "unhealthy". No web port / no ps in image to probe.
      disable: true

  # Celery Beat for dev profile
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skyspy_celery_beat_dev
    # Beat can lose the race with initial migrations on first boot - restart instead of staying dead
    restart: unless-stopped
    profiles: ["dev"]
    env_file:
      - .env.test
    environment:
      - DJANGO_SETTINGS_MODULE=skyspy.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-adsb}:${POSTGRES_PASSWORD:-adsb}@pgbouncer:5432/${POSTGRES_DB:-adsb}
      - REDIS_URL=redis://redis:6379/0
      # Aircraft streaming (needed for beat schedule)
      - AIRCRAFT_STREAM_ENABLED=${AIRCRAFT_STREAM_ENABLED:-True}
    volumes:
      - ./skyspy_django/skyspy:/app/skyspy:ro  # Hot reload Python code
      - ./skyspy_common/skyspy_common:/opt/venv/lib/python3.14/site-packages/skyspy_common:ro  # Hot reload shared pkg (subprocess_decode etc.)
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - test-network
    command: >
      celery -A skyspy beat
      --loglevel=info
      --scheduler=django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      # Base image HEALTHCHECK curls :8000 (the web server) which beat does not
      # run -> always "unhealthy". Beat has no inspect-ping; nothing depends on
      # its health condition.
      disable: true

  # --- PgBouncer ---
  pgbouncer:
    image: edoburu/pgbouncer:latest
    profiles: ["dev","test"]
    container_name: skyspy_pgbouncer
    environment:
      - DB_USER=${POSTGRES_USER:-adsb}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-adsb}
      - DB_HOST=postgres
      - DB_NAME=${POSTGRES_DB:-adsb}
      # Transaction pooling is best for modern async apps
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
      - AUTH_TYPE=plain
      - ADMIN_USERS=${POSTGRES_USER:-adsb}
    ports:
      - "5432" # Internal port exposure
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  adsb-dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: skyspy-dashboard-dev
    working_dir: /app
    profiles: ["dev"]
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/vite.config.js:/app/vite.config.js
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_API_TARGET=${VITE_API_TARGET:-http://api:8000}
    stdin_open: true
    tty: true
    networks:
      - test-network

  # PostgreSQL for integration tests
  postgres:
    # Combined PostGIS + pgvector image (docker/postgres/Dockerfile).
    build:
      context: ./docker/postgres
    image: skyspy-postgres:pg16-postgis
    profiles: ["dev","test"]
    container_name: skyspy_postgres_test
    # Docker's default /dev/shm is 64M; parallel VACUUM/ANALYZE + hash ops need
    # more shared memory or fail with "No space left on device".
    shm_size: 256mb
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-adsb}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-adsb}
      - POSTGRES_DB=${POSTGRES_DB:-adsb}
      - POSTGRES_TEST_DB=${POSTGRES_TEST_DB:-adsb_test}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adsb} -d ${POSTGRES_DB:-adsb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./test/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - test-network

  # Redis for SSE pub/sub across workers
  redis:
    image: redis:7-alpine
    profiles: ["dev","test"]
    container_name: skyspy_redis_test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /data
    networks:
      - test-network

  # Mock ultrafeeder service for integration tests
  ultrafeeder:
    build:
      context: ./test/mock-1090
      dockerfile: Dockerfile
    image: ghcr.io/cha0s-corp/1090-mock:latest
    profiles: ["dev","test"]
    # Auto-recover if the Flask dev server crashes/hangs after hours of uptime
    # (previously ran with no restart policy, so a crash stayed dead — the
    # "mock stopped after 4h" symptom). mem_limit caps runaway state growth.
    restart: unless-stopped
    mem_limit: 512m
    command: ["python3", "mock_server.py"]
    environment:
      - MOCK_TYPE=ultrafeeder
      - ADSBX_API_KEY=${ADSBX_API_KEY:-}
      # Data source: "simulated" (default) or "live" - live polls a keyless
      # open ADS-B API (adsb.lol/adsb.fi/airplanes.live) centered on the feeder
      # and serves real aircraft through every endpoint/stream
      - DATA_SOURCE=${MOCK_DATA_SOURCE:-simulated}
      - LIVE_SOURCE=${MOCK_LIVE_SOURCE:-adsb_lol}
      # RapidAPI key, only needed when MOCK_LIVE_SOURCE=adsbexchange (keep in gitignored .env.test)
      - LIVE_API_KEY=${MOCK_LIVE_API_KEY:-}
      - LIVE_POLL_INTERVAL=${MOCK_LIVE_POLL_INTERVAL:-5}
      - LIVE_RADIUS_NM=${MOCK_LIVE_RADIUS_NM:-150}
      # Center the mock coverage on the configured feeder location
      - COVERAGE_LAT=${FEEDER_LAT:-47.9377}
      - COVERAGE_LON=${FEEDER_LON:--121.9687}
      # JSON streaming configuration (readsb net-json-port compatible)
      - JSON_STREAM_ENABLED=${JSON_STREAM_ENABLED:-true}
      - JSON_STREAM_PORT=30047
      - JSON_STREAM_INTERVAL_MS=${JSON_STREAM_INTERVAL_MS:-100}
      # SSE streaming configuration (ADSBexchange compatible)
      - SSE_ENABLED=${SSE_ENABLED:-true}
      - SSE_INTERVAL_MS=${SSE_INTERVAL_MS:-1000}
      # Live-data refresh cadence (seconds) for the mock ONLY. Sourced from a
      # dedicated var so it never collides with Django's int CACHE_TTL — the
      # mock parses this as a float and can go sub-second (e.g. 0.5 = 500ms).
      - CACHE_TTL=${MOCK_LIVE_REFRESH_SEC:-5}
    networks:
      - test-network
    ports:
      - ${ULTRAFEEDER_PORT_EXTERNAL:-18080}:80
      - ${ULTRAFEEDER_STREAM_PORT_EXTERNAL:-30047}:30047
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Mock dump978 service for integration tests
  dump978:
    build:
      context: ./test/mock-1090
      dockerfile: Dockerfile
    image: ghcr.io/cha0s-corp/1090-mock:latest
    profiles: ["dev","test"]
    restart: unless-stopped
    mem_limit: 512m
    command: ["python3", "mock_1090.py"]
    environment:
      - MOCK_TYPE=dump978
      - ADSBX_API_KEY=${ADSBX_API_KEY:-}
    networks:
      - test-network
    ports:
      - ${DUMP978_PORT_EXTERNAL:-18081}:80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  acarshub-mock:
    build:
      context: ./test/acars-mock/
      dockerfile: Dockerfile
    image: ghcr.io/cha0s-corp/acarshub-mock:latest
    profiles: ["dev","test"]
    container_name: acarshub-mock
    restart: unless-stopped
    networks:
      - test-network
    ports:
      # Web interface
      - "${ACARSHUB_WEB_PORT:-8080}:8080"
      # UDP ports (same as real ACARSHUB - for receiving from decoders)
      - "${ACARS_UDP_PORT:-5550}:5550/udp"   # ACARS (acarsdec)
      - "${VDLM2_UDP_PORT:-5555}:5555/udp"   # VDLM2 (dumpvdl2)
      - "${HFDL_UDP_PORT:-5556}:5556/udp"    # HFDL (dumphfdl)
      - "${IMSL_UDP_PORT:-5557}:5557/udp"    # IMSL (Inmarsat)
      - "${IRDM_UDP_PORT:-5558}:5558/udp"    # IRDM (Iridium)
      # TCP relay ports (for consuming messages)
      - "${ACARS_TCP_PORT:-15550}:15550"      # ACARS TCP relay
      - "${VDLM2_TCP_PORT:-15555}:15555"      # VDLM2 TCP relay
      - "${HFDL_TCP_PORT:-15556}:15556"       # HFDL TCP relay
      - "${IMSL_TCP_PORT:-15557}:15557"       # IMSL TCP relay
      - "${IRDM_TCP_PORT:-15558}:15558"       # IRDM TCP relay

    environment:
      # Mock message generation
      - MOCK_ENABLED=${MOCK_ENABLED:-true}
      - MOCK_INTERVAL_MIN=${MOCK_INTERVAL_MIN:-1}
      - MOCK_INTERVAL_MAX=${MOCK_INTERVAL_MAX:-5}

      # Station identification
      - STATION_ID=${STATION_ID:-test-station}

      # Relay configuration - send messages to acars-listener
      - RELAY_HOST=acars-listener
      - RELAY_PORT=5550
      - RELAY_PORT_VDLM2=5555
      - RELAY_PROTOCOL=udp

    healthcheck:
      # Image has no curl; use python3 (present, runs mock_server.py) to probe.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/stats',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Mock airband transmission uploader for testing audio pipeline
  mock-airband-uploader:
    build:
      context: ./test/mock-airband-uploader
      dockerfile: Dockerfile
    image: ghcr.io/cha0s-corp/rtl-airband-mock:latest
    profiles: ["dev"]
    container_name: mock-airband-uploader
    restart: unless-stopped
    environment:
      - SKYSPY_API_URL=http://api:8000
      - METRICS_PORT=9091
      - MIN_TRANSMISSION_INTERVAL=5
      - MAX_TRANSMISSION_INTERVAL=30
    ports:
      - "9091:9091"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9091/metrics', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # SearXNG meta-search — the general web-search backend for the LLM
  # (services/web_search.py). Reachable in-stack at http://searxng:8080; the app
  # is pointed at it via WEB_SEARCH_PROVIDER=searxng + WEB_SEARCH_URL in .env.test.
  searxng:
    image: searxng/searxng:latest
    profiles: ["dev"]
    container_name: skyspy_searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-skyspy-dev-searxng-secret}
      - UWSGI_WORKERS=${SEARXNG_WORKERS:-2}
      - UWSGI_THREADS=4
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - test-network
    ports:
      - ${SEARXNG_PORT_EXTERNAL:-18090}:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  test-network:
    driver: bridge

volumes:
  node_modules:
