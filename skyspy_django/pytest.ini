[pytest]
DJANGO_SETTINGS_MODULE = skyspy.tests.test_settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Tests
python_functions = test_*
addopts = -v --tb=short --reuse-db
testpaths = skyspy/tests
asyncio_mode = auto
django_debug_mode = true
markers =
    eval: real-LLM assistant evals against ASSISTANT_EVAL_URL (auto-skipped when unset; run via `make eval-assistant`)
